# Docker 编排配置 - 喵搭达人O2O平台
version: '3.9'

# 网络定义
networks:
  miaoda-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 数据卷
volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  centrifugo-data:
  nginx-logs:
  prometheus-data:
  grafana-data:
  uploads-data:
  db-backups-data:

# 通用环境变量
x-common-env: &common-env
  TZ: UTC
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: tohome
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tohome123}
  POSTGRES_DB: tohome
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_USER: guest
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
  JWT_SECRET: ${JWT_SECRET:-miaoda-jwt-secret-2026}

services:
  # ============= 基础服务 =============
  postgres:
    image: postgres:16-alpine
    container_name: miaoda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tohome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tohome123}
      POSTGRES_DB: ${POSTGRES_DB:-tohome}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./tohome-backend/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - miaoda-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miaoda}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: miaoda-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - miaoda-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: miaoda-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-miaoda}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbit123}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - miaoda-net

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: miaoda-centrifugo
    restart: unless-stopped
    command: centrifugo -c config.json
    environment:
      - CENTRIFUGO_ENGINE=redis
      - CENTRIFUGO_REDIS_ADDRESS=redis:6379
      - CENTRIFUGO_REDIS_PASSWORD=redis123
      - CENTRIFUGO_REDIS_DB=0
    volumes:
      - ./tohome-deploy/centrifugo/config.json:/centrifugo/config.json
      - centrifugo-data:/centrifugo/data
    ports:
      - "8000:8000"
    networks:
      - miaoda-net
    depends_on:
      - redis

  # ============= 后端微服务 =============
  gateway:
    build:
      context: ./tohome-backend
      args:
        SERVICE: gateway
    container_name: miaoda-gateway
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: gateway
      SERVICE_PORT: 8080
      SVC_GATEWAY_HOST: gateway
      SVC_USER_HOST: user-service
      SVC_ORDER_HOST: order-service
      SVC_TALENT_HOST: talent-service
      SVC_PAYMENT_HOST: payment-service
      SVC_DISPATCH_HOST: dispatch-service
    ports:
      - "8090:8080"
    networks:
      - miaoda-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  user-service:
    build:
      context: ./tohome-backend
      args:
        SERVICE: user
    container_name: miaoda-user
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: user
      SERVICE_PORT: 8081
    volumes:
      - uploads-data:/app/public/uploads
      - db-backups-data:/app/backups
    networks:
      - miaoda-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build:
      context: ./tohome-backend
      args:
        SERVICE: order
    container_name: miaoda-order
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: order
      SERVICE_PORT: 8082
    networks:
      - miaoda-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  talent-service:
    build:
      context: ./tohome-backend
      args:
        SERVICE: talent
    container_name: miaoda-talent
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: talent
      SERVICE_PORT: 8083
    networks:
      - miaoda-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-service:
    build:
      context: ./tohome-backend
      args:
        SERVICE: payment
    container_name: miaoda-payment
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: payment
      SERVICE_PORT: 8084
      WECHAT_APP_ID: ${WECHAT_APP_ID}
      WECHAT_MCH_ID: ${WECHAT_MCH_ID}
      WECHAT_API_KEY: ${WECHAT_API_KEY}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID}
    networks:
      - miaoda-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dispatch-service:
    build:
      context: ./tohome-backend
      args:
        SERVICE: dispatch
    container_name: miaoda-dispatch
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: dispatch
      SERVICE_PORT: 8085
    networks:
      - miaoda-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  # ============= 前端服务 =============
  admin:
    build:
      context: ./tohome-admin
      dockerfile: Dockerfile
    container_name: miaoda-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3008:3000"
    networks:
      - miaoda-net
    depends_on:
      - gateway

  user-web:
    image: nginx:1.25-alpine
    container_name: miaoda-user-web
    restart: unless-stopped
    ports:
      - "3009:80"
    volumes:
      - ./tohome-user-web/dist:/usr/share/nginx/html:ro
      - ./tohome-deploy/nginx/user-conf/user.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - miaoda-net
    depends_on:
      - gateway

  # ============= 反向代理 =============
  nginx:
    image: nginx:1.25-alpine
    container_name: miaoda-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./tohome-deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./tohome-deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tohome-deploy/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - miaoda-net
    depends_on:
      - admin
      - user-web
      - gateway

  # ============= 监控 =============
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: miaoda-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./tohome-deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - miaoda-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: miaoda-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - miaoda-net
    depends_on:
      - prometheus
